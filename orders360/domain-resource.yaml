version: v1alpha
type: vulcan
name: orders360mrab
tags:
  - pricing-usecase
spec:
  runAsUser: "abhishekbharadwajtmdcio"
  compute: ct-sandbox
  engine: postgres
  repo:
    url: https://github.com/mrabhishekb/vulcan-deployment/
    syncFlags:
      - "--ref=main"
      - "--submodules=off"
    baseDir: vulcan-deployment/orders360
    secret: ct-sandbox:git-sync-mrab
  depots:
    - dataos://postgresdepot?purpose=rw
  workflow:
    type: schedule
    schedule:
      crons:
        - "*/45 * * * *"
      endOn: "2027-01-01T00:00:00-00:00"
      timezone: "US/Pacific"
      concurrencyPolicy: Forbid
    logLevel: INFO

    resource:
      request:
        cpu: "200m"
        memory: "512Mi"
      limit:
        cpu: "1000m"
        memory: "1Gi"

    plan:
      command:
        - vulcan
      arguments:
        - --log-to-stdout
        - plan
        - --auto-apply

    run:
      command:
        - vulcan
      arguments:
        - --log-to-stdout
        - run

  api:
    replicas: 1
    logLevel: INFO
    resource:
      request:
        cpu: "200m"
        memory: "512Mi"
      limit:
        cpu: "5000m"
        memory: "4Gi"
 
 